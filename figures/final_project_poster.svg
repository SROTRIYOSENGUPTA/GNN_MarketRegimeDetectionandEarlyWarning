<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Regime GNN technical final project poster</title>
  <desc id="desc">A light-background technical poster for market regime detection and early warning with dynamic heterogeneous graph neural networks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf6"/>
      <stop offset="46%" stop-color="#eef7ff"/>
      <stop offset="100%" stop-color="#eefdf5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="52%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#475569" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.15" fill="#0f766e" opacity="0.08"/>
    </pattern>
    <style>
      text { font-family: "Aptos", "Helvetica Neue", Arial, sans-serif; }
      .title { fill: #0f172a; font-size: 44px; font-weight: 820; letter-spacing: -0.8px; }
      .subtitle { fill: #334155; font-size: 17px; font-weight: 500; }
      .authors { fill: #075985; font-size: 13.6px; font-weight: 650; letter-spacing: 0.15px; }
      .section { fill: #0f172a; font-size: 21px; font-weight: 800; letter-spacing: -0.15px; }
      .subhead { fill: #075985; font-size: 14.2px; font-weight: 760; letter-spacing: 0.2px; }
      .body { fill: #1e293b; font-size: 13.6px; font-weight: 500; }
      .body2 { fill: #334155; font-size: 12.2px; font-weight: 460; }
      .tiny { fill: #64748b; font-size: 10.4px; font-weight: 560; letter-spacing: 0.1px; }
      .code { fill: #0f4c81; font-size: 11.8px; font-family: "SFMono-Regular", "Consolas", monospace; font-weight: 540; }
      .metric { fill: #0f172a; font-size: 30px; font-weight: 860; letter-spacing: -0.35px; }
      .metric-label { fill: #0369a1; font-size: 10.4px; font-weight: 760; text-transform: uppercase; letter-spacing: 0.72px; }
      .card { fill: #ffffff; fill-opacity: 0.93; stroke: #64748b; stroke-opacity: 0.25; stroke-width: 1.1; }
      .inner { fill: #f0f9ff; fill-opacity: 0.94; stroke: #0e7490; stroke-opacity: 0.22; stroke-width: 1; }
      .warm { fill: #fffbeb; fill-opacity: 0.94; stroke: #d97706; stroke-opacity: 0.22; stroke-width: 1; }
      .chip { fill: #e0f2fe; fill-opacity: 0.93; stroke: #0284c7; stroke-opacity: 0.38; stroke-width: 1; }
      .chip-text { fill: #075985; font-size: 11.8px; font-weight: 760; }
      .axis { stroke: #475569; stroke-width: 1.2; }
      .gridline { stroke: #cbd5e1; stroke-width: 0.9; }
      .bar-label { fill: #334155; font-size: 10.2px; font-weight: 700; }
      .bar-value { fill: #0f172a; font-size: 10.2px; font-weight: 760; }
      .bullet { fill: #0ea5e9; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <circle cx="1710" cy="120" r="245" fill="#38bdf8" opacity="0.13"/>
  <circle cx="190" cy="930" r="290" fill="#22c55e" opacity="0.09"/>
  <path d="M0,896 C260,764 462,982 760,896 C1050,812 1230,612 1520,690 C1710,742 1812,814 1920,740 L1920,1080 L0,1080 Z" fill="#0f766e" opacity="0.055"/>

  <g transform="translate(54,34)">
    <rect x="0" y="8" width="1812" height="118" rx="28" fill="#475569" opacity="0.10"/>
    <rect x="0" y="0" width="1812" height="118" rx="28" fill="#ffffff" fill-opacity="0.88" stroke="#64748b" stroke-opacity="0.26"/>
    <rect x="0" y="0" width="1812" height="7" rx="3.5" fill="url(#accent)"/>
    <text class="title" x="32" y="54">Dynamic Regime GNN for Market Regime Detection and Early Warning</text>
    <text class="subtitle" x="36" y="87">Multi-relational temporal graph learning over stock-market snapshots: classify current regime and forecast Stress onset in days t+5...t+20</text>
    <text class="authors" x="36" y="110">Srotriyo Sengupta and Yifan Zhang</text>
    <text class="tiny" x="1496" y="106">curated 30-stock universe | SPY + VIX | NVIDIA H200 GPU pilot</text>
  </g>

  <!-- Column 1: task, data, graph -->
  <g transform="translate(54,176)">
    <rect x="0" y="8" width="560" height="218" rx="24" fill="#475569" opacity="0.08"/>
    <rect class="card" x="0" y="0" width="560" height="218" rx="24"/>
    <text class="section" x="24" y="36">1. Problem and Supervised Targets</text>
    <text class="body" x="24" y="66">Represent the equity market as a sequence of heterogeneous graphs:</text>
    <text class="code" x="34" y="91">S_t = {G_{t-29}, ..., G_t},   G_t = (V, E_r, X_t)</text>
    <text class="body" x="24" y="122">Dual output task:</text>
    <text class="code" x="34" y="147">y_regime(t) in {Bull, Crash, Liquidity, Stress}</text>
    <text class="code" x="34" y="171">y_warn(t) = 1[exists Stress in the forward window t+5 ... t+20]</text>
    <text class="body2" x="24" y="194">Key idea: regime shifts are relational events;</text>
    <text class="body2" x="24" y="211">correlation and contagion structure should carry signal.</text>
  </g>

  <g transform="translate(54,414)">
    <rect x="0" y="8" width="560" height="320" rx="24" fill="#475569" opacity="0.08"/>
    <rect class="card" x="0" y="0" width="560" height="320" rx="24"/>
    <text class="section" x="24" y="36">2. Data, Feature Engineering, and Labels</text>
    <g transform="translate(24,58)">
      <rect class="inner" x="0" y="0" width="118" height="66" rx="15"/>
      <text class="metric" x="18" y="39">30</text>
      <text class="metric-label" x="18" y="58">stocks</text>
    </g>
    <g transform="translate(154,58)">
      <rect class="inner" x="0" y="0" width="118" height="66" rx="15"/>
      <text class="metric" x="18" y="39">37</text>
      <text class="metric-label" x="18" y="58">features</text>
    </g>
    <g transform="translate(284,58)">
      <rect class="inner" x="0" y="0" width="118" height="66" rx="15"/>
      <text class="metric" x="18" y="39">900</text>
      <text class="metric-label" x="18" y="58">train samples</text>
    </g>
    <g transform="translate(414,58)">
      <rect class="inner" x="0" y="0" width="118" height="66" rx="15"/>
      <text class="metric" x="18" y="39">733</text>
      <text class="metric-label" x="18" y="58">val samples</text>
    </g>
    <text class="subhead" x="24" y="154">Label generation: transparent rules with expanding thresholds</text>
    <text class="code" x="34" y="179">ret_20d = SPY_t / SPY_{t-20} - 1</text>
    <text class="code" x="34" y="201">vol_20d = std(ret,20) * sqrt(252)</text>
    <text class="code" x="34" y="225">Stress: vol_20d &gt; p80(vol) and avg_corr &gt; p75(corr)</text>
    <text class="code" x="34" y="249">Crash : ret_20d &lt; -5% and vol_20d &gt; p75(vol)</text>
    <text class="code" x="34" y="273">Bull  : ret_20d &gt; 0 and vol_20d &lt; p60(vol); Liquidity = residual</text>
    <text class="body2" x="24" y="306">Val set: 109 Stress days and 142 transition-positive examples.</text>
  </g>

  <g transform="translate(54,754)">
    <rect x="0" y="8" width="560" height="256" rx="24" fill="#475569" opacity="0.08"/>
    <rect class="card" x="0" y="0" width="560" height="256" rx="24"/>
    <text class="section" x="24" y="36">3. Daily Heterogeneous Graph Construction</text>
    <text class="body" x="24" y="66">Node matrix and relations:</text>
    <text class="code" x="34" y="91">X_t in R^{N x 37}, N=30; r={correlation, etf_cohold, supply_chain}</text>
    <text class="subhead" x="24" y="123">Correlation relation</text>
    <text class="code" x="34" y="149">rolling rho_ij over 30 trading days; keep top-K positive</text>
    <text class="code" x="34" y="171">and bottom-K negative neighbors</text>
    <text class="subhead" x="24" y="200">Proxy structural relations</text>
    <text class="code" x="34" y="226">ETF co-hold: sector/sub-industry proxy when holdings are absent</text>
    <text class="code" x="34" y="246">edge_attr = [w, |w|, same_sector, same_subind]</text>
  </g>

  <!-- Column 2: architecture and training -->
  <g transform="translate(680,176)">
    <rect x="0" y="8" width="560" height="458" rx="24" fill="#475569" opacity="0.08"/>
    <rect class="card" x="0" y="0" width="560" height="458" rx="24"/>
    <text class="section" x="24" y="36">4. Dynamic Regime GNN Architecture</text>
    <g transform="translate(24,64)">
      <rect class="chip" x="0" y="0" width="88" height="36" rx="12"/>
      <text class="chip-text" x="44" y="23" text-anchor="middle">T=30</text>
      <line x1="96" y1="18" x2="128" y2="18" stroke="#64748b" stroke-width="3"/>
      <polygon points="128,18 119,12 119,24" fill="#64748b"/>
      <rect class="chip" x="138" y="0" width="104" height="36" rx="12"/>
      <text class="chip-text" x="190" y="23" text-anchor="middle">MLP</text>
      <line x1="250" y1="18" x2="282" y2="18" stroke="#64748b" stroke-width="3"/>
      <polygon points="282,18 273,12 273,24" fill="#64748b"/>
      <rect class="chip" x="292" y="0" width="104" height="36" rx="12"/>
      <text class="chip-text" x="344" y="23" text-anchor="middle">R-GCN</text>
      <line x1="404" y1="18" x2="436" y2="18" stroke="#64748b" stroke-width="3"/>
      <polygon points="436,18 427,12 427,24" fill="#64748b"/>
      <rect class="chip" x="446" y="0" width="82" height="36" rx="12"/>
      <text class="chip-text" x="487" y="23" text-anchor="middle">LSTM</text>
    </g>
    <g transform="translate(24,126)">
      <rect class="inner" x="0" y="0" width="248" height="128" rx="18"/>
      <text class="subhead" x="18" y="28">Node encoder</text>
      <text class="code" x="18" y="54">x_i,t: 37 -> 128</text>
      <text class="body2" x="18" y="82">projects raw stock features</text>
      <text class="body2" x="18" y="106">before message passing</text>
    </g>
    <g transform="translate(288,126)">
      <rect class="inner" x="0" y="0" width="248" height="128" rx="18"/>
      <text class="subhead" x="18" y="28">Spatial R-GCN</text>
      <text class="code" x="18" y="54">2 layers, hidden=128</text>
      <text class="body2" x="18" y="82">relation-aware aggregation</text>
      <text class="body2" x="18" y="106">over 3 edge types</text>
    </g>
    <g transform="translate(24,274)">
      <rect class="inner" x="0" y="0" width="248" height="128" rx="18"/>
      <text class="subhead" x="18" y="28">Temporal modeling</text>
      <text class="code" x="18" y="54">g_t = mean_i h_{i,t}</text>
      <text class="code" x="18" y="78">LSTM hidden=256, layers=2</text>
      <text class="body2" x="18" y="106">causal sequence encoder</text>
    </g>
    <g transform="translate(288,274)">
      <rect class="inner" x="0" y="0" width="248" height="128" rx="18"/>
      <text class="subhead" x="18" y="28">Dual heads</text>
      <text class="body2" x="18" y="54">Regime head: 4-way classifier</text>
      <text class="body2" x="18" y="78">Warning head: binary logit</text>
      <text class="code" x="18" y="106">1,141,783 params</text>
    </g>
  </g>

  <g transform="translate(680,654)">
    <rect x="0" y="8" width="560" height="356" rx="24" fill="#475569" opacity="0.08"/>
    <rect class="card" x="0" y="0" width="560" height="356" rx="24"/>
    <text class="section" x="24" y="36">5. Objective, Split, and Leakage Control</text>
    <text class="subhead" x="24" y="70">Multi-task training loss</text>
    <text class="code" x="34" y="96">L_total = 1.0 * L_focal_regime + 1.0 * L_bce_transition</text>
    <text class="code" x="34" y="120">Focal CE: gamma=2.0, label_smoothing=0.05</text>
    <text class="code" x="34" y="144">BCEWithLogits; AdamW lr=5e-4, warmup=10, grad_clip=1.0</text>
    <text class="subhead" x="24" y="184">Experiment split</text>
    <text class="code" x="34" y="210">train: 2018-01-01..2021-12-31</text>
    <text class="code" x="34" y="234">val  : 2022-01-01..2024-12-31</text>
    <text class="body2" x="24" y="270">Dataset constructor filters target dates so the full future warning window</text>
    <text class="body2" x="24" y="294">stays inside the split. This avoids train/validation label-horizon leakage.</text>
    <text class="body2" x="24" y="326">Run setup: NVIDIA H200, PyTorch 2.11.0+cu130, batch=1, 2 epochs.</text>
  </g>

  <!-- Column 3: results, diagnostics, ablation -->
  <g transform="translate(1306,176)">
    <rect x="0" y="8" width="560" height="294" rx="24" fill="#475569" opacity="0.08"/>
    <rect class="card" x="0" y="0" width="560" height="294" rx="24"/>
    <text class="section" x="24" y="36">6. Main GPU Results</text>
    <text class="body2" x="24" y="62">Sparse correlation graph, corr_top_k=5, corr_bot_k=3, best epoch=2.</text>
    <g transform="translate(24,84)">
      <rect class="inner" x="0" y="0" width="158" height="74" rx="16"/>
      <text class="metric" x="18" y="44">0.638</text>
      <text class="metric-label" x="18" y="64">val acc</text>
    </g>
    <g transform="translate(200,84)">
      <rect class="inner" x="0" y="0" width="158" height="74" rx="16"/>
      <text class="metric" x="18" y="44">0.451</text>
      <text class="metric-label" x="18" y="64">macro-F1</text>
    </g>
    <g transform="translate(376,84)">
      <rect class="inner" x="0" y="0" width="158" height="74" rx="16"/>
      <text class="metric" x="18" y="44">0.792</text>
      <text class="metric-label" x="18" y="64">trans AUC</text>
    </g>
    <g transform="translate(24,180)">
      <rect class="warm" x="0" y="0" width="158" height="74" rx="16"/>
      <text class="metric" x="18" y="44">0.528</text>
      <text class="metric-label" x="18" y="64">precision</text>
    </g>
    <g transform="translate(200,180)">
      <rect class="warm" x="0" y="0" width="158" height="74" rx="16"/>
      <text class="metric" x="18" y="44">0.472</text>
      <text class="metric-label" x="18" y="64">recall</text>
    </g>
    <g transform="translate(376,180)">
      <rect class="warm" x="0" y="0" width="158" height="74" rx="16"/>
      <text class="metric" x="18" y="44">127</text>
      <text class="metric-label" x="18" y="64">positive warnings</text>
    </g>
  </g>

  <g transform="translate(1306,494)">
    <rect x="0" y="8" width="560" height="250" rx="24" fill="#475569" opacity="0.08"/>
    <rect class="card" x="0" y="0" width="560" height="250" rx="24"/>
    <text class="section" x="24" y="36">7. Validation Diagnostics</text>
    <text class="body2" x="24" y="62">Prediction counts show rare-class failure modes:</text>
    <text class="body2" x="24" y="79">no Crash predictions; Stress remains under-predicted.</text>
    <rect x="398" y="68" width="12" height="12" rx="3" fill="#38bdf8"/>
    <text class="tiny" x="416" y="79">Pred</text>
    <rect x="462" y="68" width="12" height="12" rx="3" fill="#fb7185"/>
    <text class="tiny" x="480" y="79">True</text>
    <g transform="translate(36,102)">
      <line class="axis" x1="0" y1="96" x2="486" y2="96"/>
      <line class="gridline" x1="0" y1="48" x2="486" y2="48"/>
      <rect x="20" y="6" width="28" height="90" rx="6" fill="#38bdf8"/>
      <rect x="54" y="14" width="28" height="82" rx="6" fill="#fb7185"/>
      <text class="bar-value" x="34" y="-2" text-anchor="middle">387</text>
      <text class="bar-value" x="68" y="6" text-anchor="middle">354</text>
      <text class="bar-label" x="52" y="120" text-anchor="middle">Bull</text>
      <rect x="144" y="96" width="28" height="0" rx="6" fill="#38bdf8"/>
      <rect x="178" y="92" width="28" height="4" rx="2" fill="#fb7185"/>
      <text class="bar-value" x="158" y="86" text-anchor="middle">0</text>
      <text class="bar-value" x="192" y="83" text-anchor="middle">15</text>
      <text class="bar-label" x="176" y="120" text-anchor="middle">Crash</text>
      <rect x="276" y="35" width="28" height="61" rx="6" fill="#38bdf8"/>
      <rect x="310" y="38" width="28" height="58" rx="6" fill="#fb7185"/>
      <text class="bar-value" x="290" y="27" text-anchor="middle">267</text>
      <text class="bar-value" x="324" y="30" text-anchor="middle">255</text>
      <text class="bar-label" x="308" y="120" text-anchor="middle">Liquidity</text>
      <rect x="424" y="78" width="28" height="18" rx="6" fill="#38bdf8"/>
      <rect x="458" y="72" width="28" height="24" rx="6" fill="#fb7185"/>
      <text class="bar-value" x="438" y="70" text-anchor="middle">79</text>
      <text class="bar-value" x="472" y="64" text-anchor="middle">109</text>
      <text class="bar-label" x="456" y="120" text-anchor="middle">Stress</text>
    </g>
  </g>

  <g transform="translate(1306,768)">
    <rect x="0" y="8" width="560" height="242" rx="24" fill="#475569" opacity="0.08"/>
    <rect class="card" x="0" y="0" width="560" height="242" rx="24"/>
    <text class="section" x="24" y="36">8. Graph Sparsity Ablation and Takeaway</text>
    <text class="body2" x="24" y="62">Dense graph keeps more neighbors (10/5) but underperforms sparse graph (5/3).</text>
    <line class="axis" x1="54" y1="184" x2="512" y2="184"/>
    <line class="axis" x1="54" y1="82" x2="54" y2="184"/>
    <line class="gridline" x1="54" y1="133" x2="512" y2="133"/>
    <line class="gridline" x1="54" y1="82" x2="512" y2="82"/>
    <text class="tiny" x="42" y="188" text-anchor="end">0</text>
    <text class="tiny" x="42" y="137" text-anchor="end">.5</text>
    <text class="tiny" x="42" y="86" text-anchor="end">1</text>
    <rect x="116" y="138" width="34" height="46" rx="6" fill="#38bdf8"/>
    <rect x="158" y="143" width="34" height="41" rx="6" fill="#f59e0b"/>
    <text class="bar-value" x="133" y="130" text-anchor="middle">.451</text>
    <text class="bar-value" x="175" y="135" text-anchor="middle">.407</text>
    <text class="bar-label" x="154" y="207" text-anchor="middle">Macro-F1</text>
    <rect x="338" y="103" width="34" height="81" rx="6" fill="#38bdf8"/>
    <rect x="380" y="106" width="34" height="78" rx="6" fill="#f59e0b"/>
    <text class="bar-value" x="355" y="95" text-anchor="middle">.792</text>
    <text class="bar-value" x="397" y="98" text-anchor="middle">.761</text>
    <text class="bar-label" x="376" y="207" text-anchor="middle">Transition AUC</text>
    <rect x="126" y="70" width="12" height="12" rx="3" fill="#38bdf8"/>
    <text class="tiny" x="144" y="81">Sparse 5/3</text>
    <rect x="244" y="70" width="12" height="12" rx="3" fill="#f59e0b"/>
    <text class="tiny" x="262" y="81">Dense 10/5</text>
  </g>
</svg>
